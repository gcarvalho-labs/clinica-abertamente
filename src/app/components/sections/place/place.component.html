<section class="place">
  <div class="place__container">
    <div>
      <h3 class="place__label">ESPAÇO</h3>
      <div class="place__header">
        <h2 class="place__title">
          Nosso <span class="place__title--emphasis">Espaço</span>
        </h2>
      </div>
    </div>
    <div class="place__content">
      <app-stepper
        class="place__stepper"
        [steps]="steps"
        [activeStepIndex]="activeStepIndex"
      ></app-stepper>

      <div class="place__grid">
        <div
          class="place__grid-item"
          *ngFor="let place of places"
          [style.background-image]="'url(' + place.url + ')'"
          [attr.aria-label]="place.alt"
        ></div>
      </div>
    </div>

    <p class="place__paragraph">
      Nosso espaço foi pensado para oferecer uma experiência terapêutica com
      conforto, estrutura e profissionalismo.
    </p>

    <button class="place__button place__button--primary">
      Vamos conversar
    </button>
  </div>
</section>
